<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=5.0" />
    <title>For My sister ❤</title>
    <link
      rel="icon"
      href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLqaz6CAqsItoSBq7YykAih5EHPIBtcq2VYQ&s"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <style>
      .birthday-banner {
        position: fixed; /* أو absolute حسب تصميم موقعك */
        top: 0;
        right: 0;
        display: inline-flex;
        flex-direction: column;
        align-items: flex-end;
        text-align: right;
        direction: rtl;
        padding: 14px 20px 14px 28px;
        background: linear-gradient(135deg, #63276e 0%, #fff8f0 100%);
        border-radius: 0 0 0 20px;
        border-left: 3px solid #817ac0;
        border-bottom: 3px solid #a0e8e2;
        min-width: 220px;
        max-width: 300px;
        box-shadow: -3px 3px 16px rgba(151, 46, 72, 0.6);
        font-family: "Scheherazade New", serif;
        z-index: 999;
        overflow: hidden;
      }

      .stars {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .star {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #814183;
        opacity: 0;
        animation: twinkle 2.5s infinite;
      }
      .star:nth-child(1) {
        top: 12%;
        left: 15%;
      }
      .star:nth-child(2) {
        top: 25%;
        left: 8%;
        animation-delay: 0.4s;
        width: 3px;
        height: 3px;
      }
      .star:nth-child(3) {
        top: 60%;
        left: 20%;
        animation-delay: 0.8s;
        width: 5px;
        height: 5px;
      }
      .star:nth-child(4) {
        top: 80%;
        left: 10%;
        animation-delay: 1.2s;
      }
      .star:nth-child(5) {
        top: 40%;
        left: 5%;
        animation-delay: 1.6s;
        width: 3px;
        height: 3px;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.8);
        }
        50% {
          opacity: 0.7;
          transform: scale(1.2);
        }
      }

      .banner-icon {
        font-size: 20px;
        margin-bottom: 4px;
        animation: sway 3s ease-in-out infinite;
      }
      @keyframes sway {
        0%,
        100% {
          transform: rotate(-8deg);
        }
        50% {
          transform: rotate(8deg);
        }
      }

      .banner-main {
        font-size: 17px;
        font-weight: 700;
        color: #b5445a;
        line-height: 1.5;
      }
      .banner-sub {
        font-size: 12px;
        color: #c47080;
        margin-top: 3px;
        font-family: "Amiri", serif;
        font-style: italic;
      }

      .banner-date {
        margin-top: 8px;
        font-size: 13px;
        font-weight: 700;
        color: #c47080;
        background: rgba(232, 160, 180, 0.15);
        border: 1px dashed #e8a0b4;
        border-radius: 8px;
        padding: 3px 10px;
        direction: ltr;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
      }

      .corner-decoration {
        position: absolute;
        top: -1px;
        left: -1px;
        width: 30px;
        height: 30px;
        overflow: hidden;
      }
      .corner-decoration::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 30px 30px 0 0;
        border-color: #e8a0b4 transparent transparent transparent;
        opacity: 0.35;
      }
      /* ===== RESET & BASE ===== */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --deep: #0a0010;
        --p1: #6b0fa0; /* deep purple */
        --p2: #8b1fcc; /* vivid purple */
        --p3: #a535e0; /* mid purple */
        --p4: #c060f0; /* light purple */
        --p5: #d88fff; /* lavender */
        --p6: #eedaff; /* petal highlight */
        --burg: #4a005a; /* burgundy-purple shadow */
        --glow: rgba(180, 60, 255, 0.5);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 40%,
          #1a0030 0%,
          #0d0018 50%,
          #050008 100%
        );
        font-family: "Great Vibes", cursive;
        cursor: default;
      }

      /* ===== SCENE ===== */
      .scene {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* ===== BACKGROUND GLOW ORBS ===== */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        animation: orbDrift ease-in-out infinite;
        pointer-events: none;
      }
      .orb1 {
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(140, 30, 200, 0.25),
          transparent 70%
        );
        top: -10%;
        left: -10%;
        animation-duration: 14s;
      }
      .orb2 {
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(100, 0, 180, 0.2),
          transparent 70%
        );
        bottom: -5%;
        right: -5%;
        animation-duration: 18s;
        animation-delay: -6s;
      }
      .orb3 {
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(200, 80, 255, 0.15),
          transparent 70%
        );
        top: 30%;
        right: 10%;
        animation-duration: 11s;
        animation-delay: -3s;
      }
      @keyframes orbDrift {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -20px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 30px) scale(0.95);
        }
      }

      /* ===== STAR FIELD ===== */
      .stars {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .star {
        position: absolute;
        border-radius: 50%;
        background: white;
        animation: twinkle ease-in-out infinite;
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.15;
          transform: scale(1);
        }
        50% {
          opacity: 0.9;
          transform: scale(1.4);
        }
      }

      /* ===== THREE ROSES LAYOUT ===== */
      .roses-group {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 0px;
        position: relative;
      }

      /* ===== ROSE CONTAINER ===== */
      .rose-scene {
        position: relative;
        width: 260px;
        height: 360px;
        filter: drop-shadow(0 0 22px rgba(160, 50, 240, 0.75))
          drop-shadow(0 0 55px rgba(120, 20, 200, 0.35))
          drop-shadow(0 0 100px rgba(90, 0, 160, 0.2));
        opacity: 0;
        transform: translateY(60px) scale(0.85);
      }

      /* Middle rose - taller */
      .rose-scene.middle {
        width: 300px;
        height: 410px;
        z-index: 2;
        filter: drop-shadow(0 0 28px rgba(180, 60, 255, 0.9))
          drop-shadow(0 0 70px rgba(130, 20, 210, 0.45))
          drop-shadow(0 0 130px rgba(90, 0, 160, 0.25));
        margin-bottom: 0;
      }

      .rose-scene.side-left {
        transform-origin: bottom right;
      }
      .rose-scene.side-right {
        transform-origin: bottom left;
      }
      .rose-scene.middle {
        transform-origin: bottom center;
      }

      /* ===== ENTRANCE ANIMATIONS ===== */
      @keyframes roseAppear {
        0% {
          opacity: 0;
          transform: translateY(70px) scale(0.8);
        }
        60% {
          opacity: 1;
          transform: translateY(-8px) scale(1.03);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .rose-scene.side-left {
        animation:
          roseAppear 1.2s cubic-bezier(0.22, 0.9, 0.4, 1) 0.3s forwards,
          roseBreathSide 5s ease-in-out 1.6s infinite;
      }
      .rose-scene.middle {
        animation:
          roseAppear 1.2s cubic-bezier(0.22, 0.9, 0.4, 1) 1s forwards,
          roseBreathMid 5s ease-in-out 2.3s infinite;
      }
      .rose-scene.side-right {
        animation:
          roseAppear 1.2s cubic-bezier(0.22, 0.9, 0.4, 1) 1.8s forwards,
          roseBreathSide 5s ease-in-out 3.1s infinite;
      }

      @keyframes roseBreathMid {
        0%,
        100% {
          transform: scale(1) rotate(-1deg) translateY(0);
        }
        50% {
          transform: scale(1.04) rotate(1deg) translateY(-8px);
        }
      }
      @keyframes roseBreathSide {
        0%,
        100% {
          transform: scale(1) translateY(0);
        }
        50% {
          transform: scale(1.03) translateY(-6px);
        }
      }

      /* ===== PETALS BASE CSS ANIMATION CLASSES ===== */
      .p-sway-a {
        animation: swayA 4s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center bottom;
      }
      .p-sway-b {
        animation: swayB 5s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center bottom;
      }
      .p-sway-c {
        animation: swayC 3.5s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .p-sway-d {
        animation: swayD 6s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes swayA {
        0%,
        100% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(3deg);
        }
      }
      @keyframes swayB {
        0%,
        100% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(-3.5deg);
        }
      }
      @keyframes swayC {
        0%,
        100% {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(2deg) scale(1.02);
        }
      }
      @keyframes swayD {
        0%,
        100% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(-2deg);
        }
      }

      .center-glow {
        animation: cGlow 2.5s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes cGlow {
        0%,
        100% {
          opacity: 0.8;
        }
        50% {
          opacity: 1;
        }
      }

      /* ===== PETALS PULSE (subtle color shift) ===== */
      .petal-pulse {
        animation: petalPulse 4s ease-in-out infinite;
      }
      @keyframes petalPulse {
        0%,
        100% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.12) saturate(1.1);
        }
      }

      /* ===== I LOVE YOU TEXT ===== */
      .love-wrap {
        margin-top: 24px;
        position: relative;
        text-align: center;
        animation: textFloat 5s ease-in-out infinite;
      }
      @keyframes textFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      .love-text {
        font-family: "Great Vibes", cursive;
        font-size: 58px;
        line-height: 1;
        background: linear-gradient(
          135deg,
          #d88fff 0%,
          #a535e0 30%,
          #ffffff 50%,
          #c060f0 70%,
          #d88fff 100%
        );
        background-size: 250% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: textShimmer 4s linear infinite;
        letter-spacing: 2px;
      }
      @keyframes textShimmer {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 250% center;
        }
      }
      .love-underline {
        height: 1px;
        margin: 8px auto 0;
        width: 60%;
        background: linear-gradient(
          90deg,
          transparent,
          #c060f0,
          #ffffff,
          #c060f0,
          transparent
        );
        animation: lineExpand 3s ease-in-out infinite;
      }
      @keyframes lineExpand {
        0%,
        100% {
          width: 40%;
          opacity: 0.6;
        }
        50% {
          width: 80%;
          opacity: 1;
        }
      }

      /* ===== FLOATING PETALS (fallen) ===== */
      .fallen {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .fallen-petal {
        position: absolute;
        border-radius: 100% 0 100% 0;
        animation: fall linear infinite;
        opacity: 0;
      }
      @keyframes fall {
        0% {
          transform: translateY(-80px) rotate(0deg) scale(0.5);
          opacity: 0;
        }
        10% {
          opacity: 0.7;
        }
        90% {
          opacity: 0.4;
        }
        100% {
          transform: translateY(110vh) rotate(720deg) scale(1);
          opacity: 0;
        }
      }

      /* ===== PARTICLES ===== */
      .sparkles {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .sparkle {
        position: absolute;
        border-radius: 50%;
        animation: sparkleAnim ease-in-out infinite;
      }
      @keyframes sparkleAnim {
        0%,
        100% {
          transform: scale(0) translateY(0);
          opacity: 0;
        }
        30% {
          opacity: 1;
        }
        70% {
          opacity: 0.6;
        }
        100% {
          transform: scale(1.5) translateY(-60px);
          opacity: 0;
        }
      }

      /* ===== PULSE RINGS ===== */
      .rings {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(180, 60, 255, 0.4);
        animation: ringOut 4s ease-out infinite;
      }
      .ring:nth-child(2) {
        animation-delay: 1.33s;
      }
      .ring:nth-child(3) {
        animation-delay: 2.66s;
      }
      @keyframes ringOut {
        0% {
          width: 120px;
          height: 120px;
          opacity: 0.9;
        }
        100% {
          width: 600px;
          height: 600px;
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- اللافتة -->
    <div class="birthday-banner">
      <div class="stars">
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
      </div>
      <div class="corner-decoration"></div>
      <div class="banner-icon">🎀💗</div>
      <div class="banner-main">عيد ميلاد سعيد<br />يا فرحة قلبي</div>
      <div class="banner-sub">أجمل الأماني لكِ في يومكِ</div>
      <div class="banner-date">.2000 / .05 / .18</div>

      <div class="orb orb2"></div>

      <!-- stars -->

      <!-- pulse rings -->
      <div class="rings">

        <div class="ring"></div>
        <div class="ring"></div>
      </div>

      <!-- sparkles -->
      <div class="sparkles" id="sparkles"></div>

      <!-- fallen petals -->
      <div class="fallen" id="fallen"></div>

      <!-- THREE ROSES -->
      <div class="roses-group">
        <!-- Rose Left (pink-rose tones) -->
        <div class="rose-scene side-left petal-pulse">
          <svg
            viewBox="0 0 360 480"
            xmlns="http://www.w3.org/2000/svg"

            <defs>

              </radialGradient>
              <radialGradient id="pl4" cx="50%" cy="30%" r="65%">

              <radialGradient id="plCenter" cx="50%" cy="45%" r="50%">

                <stop offset="60%" stop-color="#e060b0" />
                <stop offset="100%" stop-color="#aa1f78" />
              </radialGradient>
              <linearGradient id="stemGL" x1="0" y1="0" x2="1" y2="0">

                <stop offset="50%" stop-color="#2d7a2d" />
                <stop offset="100%" stop-color="#123012" />
              </linearGradient>
              <linearGradient id="leafGL1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#4ab84a" />
                <stop offset="60%" stop-color="#267026" />

              </linearGradient>
              <linearGradient id="leafGL2" x1="1" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#38a038" />
                <stop offset="100%" stop-color="#155015" />
              </linearGradient>
              <filter id="softBloomL">
                <feGaussianBlur stdDeviation="2.5" result="b" />
                <feMerge>
                  <feMergeNode in="b" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <path
              d="M180 365 C175 390 170 420 165 465"
              stroke="url(#stemGL)"
              stroke-width="8"

              stroke-linecap="round"
            />
            <path

              stroke="#3a8a3a"

            <g class="p-sway-a">

              />
              <path
                d="M197 268 C220 244 234 200 222 162 C212 140 184 142 180 166 C190 202 198 236 197 268Z"
                fill="url(#pl1)"
                opacity="0.81"
                transform="rotate(110,197,268)"
              />
              <path
                d="M210 300 C240 278 260 235 250 194 C242 170 214 172 206 196 C212 232 214 268 210 300Z"

              <path

            <g class="p-sway-b">
              <path
                d="M180 325 C156 304 138 264 146 228 C154 206 176 204 185 224 C186 258 184 296 180 325Z"

              />
              <path

              />
              <path
                d="M154 286 C128 264 114 222 124 186 C132 164 158 166 164 188 C158 224 154 258 154 286Z"

    <script>
      // ===== STARS =====
      const starsEl = document.getElementById("stars");
      for (let i = 0; i < 120; i++) {
        const s = document.createElement("div");
        s.className = "star";
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%; top:${Math.random() * 100}%;
      animation-duration:${Math.random() * 4 + 2}s;
      animation-delay:${Math.random() * 5}s;
    `;
        starsEl.appendChild(s);
      }

      // ===== SPARKLES =====
      const sparklesEl = document.getElementById("sparkles");
      const sparkColors = [
        "#d88fff",
        "#c060f0",
        "#a535e0",
        "#eedaff",
        "#ffffff",
      ];
      for (let i = 0; i < 40; i++) {
        const sp = document.createElement("div");
        sp.className = "sparkle";
        const size = Math.random() * 5 + 2;
        sp.style.cssText = `
      width:${size}px; height:${size}px;
      background:${sparkColors[Math.floor(Math.random() * sparkColors.length)]};
      left:${20 + Math.random() * 60}%; top:${10 + Math.random() * 70}%;
      animation-duration:${Math.random() * 4 + 3}s;
      animation-delay:${Math.random() * 5}s;
    `;
        sparklesEl.appendChild(sp);
      }

      // ===== FALLEN PETALS =====
      const fallenEl = document.getElementById("fallen");
      const petalColors = [
        "rgba(160,53,224,0.6)",
        "rgba(192,96,240,0.5)",
        "rgba(216,136,255,0.55)",
        "rgba(107,15,160,0.5)",
        "rgba(238,218,255,0.45)",
      ];
      function spawnPetal() {
        const p = document.createElement("div");
        p.className = "fallen-petal";
        const w = Math.random() * 14 + 8;
        const h = w * (Math.random() * 0.6 + 0.5);
        p.style.cssText = `
      width:${w}px; height:${h}px;
      background:${petalColors[Math.floor(Math.random() * petalColors.length)]};
      left:${Math.random() * 100}%;
      top: -20px;
      border-radius:${Math.random() > 0.5 ? "100% 0 100% 0" : "60% 40% 60% 40%"};
      animation-duration:${Math.random() * 8 + 10}s;
      animation-delay:${Math.random() * 2}s;
    `;
        fallenEl.appendChild(p);
        setTimeout(() => p.remove(), 18000);
      }
      setInterval(spawnPetal, 800);

      // ===== CURSOR SPARKLE =====
      document.addEventListener("mousemove", (e) => {
        if (Math.random() > 0.6) return;
        const sp = document.createElement("div");
        sp.style.cssText = `
      position:fixed; border-radius:50%; pointer-events:none;
      width:${Math.random() * 6 + 3}px; height:${Math.random() * 6 + 3}px;
      background:${sparkColors[Math.floor(Math.random() * sparkColors.length)]};
      left:${e.clientX}px; top:${e.clientY}px;
      animation: sparkleAnim 1.2s ease-out forwards;
      z-index:9999;
    `;
        document.body.appendChild(sp);
        setTimeout(() => sp.remove(), 1200);
      });
    </script>
